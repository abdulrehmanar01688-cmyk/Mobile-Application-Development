name: mysterybox
description: A Mystery Gift Box Flutter App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0

  # Google Sign In
  google_sign_in: ^6.2.0

  # State Management
  provider: ^6.1.2

  # Animations
  lottie: ^3.1.0
  confetti: ^0.7.0
  flutter_animate: ^4.5.0

  # Audio
  audioplayers: ^6.0.0

  # Image Picker
  image_picker: ^1.1.0
  video_player: ^2.8.6

  # Share
  share_plus: ^9.0.0

  # Deep Link
  app_links: ^6.1.0

  # Local Storage
  shared_preferences: ^2.2.3

  # UUID
  uuid: ^3.0.7

  # Path
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP
  http: ^1.2.1

  # Voice Recording
  flutter_sound: ^9.2.13

  # Permissions & Notifications
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.0.0

  # Haptic
  vibration: ^2.0.0

dependency_overrides:
  web: 0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/audio/
    - assets/images/